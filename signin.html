<html>
    <head>
           <link rel="icon" href="favicon.png" type="image/png">
    
        <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;   
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .container {
            width: 800px;          
            background-color: #93DA97;
            border: 1px solid #ccc;
            border-radius: 30px;
            overflow: hidden;      
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 50px 60px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .row {
            display: flex;
            gap: 1rem;
        }

        input {
            width: 100%;
            padding: 10px 20px;
            margin: 10px 0 20px 0;
            border: 2px solid #111;
            border-radius: 999px;
            background: #e8f5e8;
            box-sizing: border-box;
            font-size: 0.95rem;
            outline: none;
        }

        input::placeholder {
            color: #aaa;
        }

        .already {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .already a {
            color: #111;
            font-weight: 600;
            text-decoration: none;
        }

        .already a:hover {
            text-decoration: underline;
        }

        .signup-btn {
            display: block;
            width: fit-content;
            margin: 0 auto;
            background-color: #fff;
            color: #111;
            padding: 12px 40px;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            border: 2px solid #111;
        }

        .signup-btn:hover {
            background-color: #f0f0f0;
        }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Create your own GrabNGo account!</h2>

            <div class="row">
                <input type="email" placeholder="youremail@example.com" />
                <input type="text" placeholder="Username" />
            </div>

            <div class="row">
                <input type="password" placeholder="Password" />
                <input type="password" placeholder="Confirm Password" />
            </div>

            <p class="already">Already have an account? <a href="home.html">Log In</a></p>

            <a href="home.html" class="signup-btn">Sign-Up</a>
        </div>
    </body>
</html>
